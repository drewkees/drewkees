<svg width="800" height="110" viewBox="0 0 800 110" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .name     { font-family: 'Segoe UI', sans-serif; font-size: 28px; font-weight: 700; fill: #1a1a2e; }
      .greeting { font-family: 'Segoe UI', sans-serif; font-size: 28px; font-weight: 400; fill: #555; }
      .cursor   { fill: #4f46e5; animation: blink 0.8s step-end infinite; }
      @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }

      .tw1,.tw2,.tw3,.tw4,.tw5 { font-family: 'Courier New', monospace; font-size: 16px; fill: #4f46e5; }

      /* Total cycle: 50s, each phrase gets 10s (8s visible, 2s transition) */

      .tw1 { animation: tw1 50s linear infinite; }
      @keyframes tw1 {
        0%    { clip-path: inset(0 100% 0 0); opacity: 1; }
        6%    { clip-path: inset(0 0% 0 0);   opacity: 1; }
        18%   { clip-path: inset(0 0% 0 0);   opacity: 1; }
        20%   { clip-path: inset(0 100% 0 0); opacity: 0; }
        100%  { clip-path: inset(0 100% 0 0); opacity: 0; }
      }

      .tw2 { animation: tw2 50s linear infinite; }
      @keyframes tw2 {
        0%    { clip-path: inset(0 100% 0 0); opacity: 0; }
        20%   { clip-path: inset(0 100% 0 0); opacity: 0; }
        20.1% { clip-path: inset(0 100% 0 0); opacity: 1; }
        26%   { clip-path: inset(0 0% 0 0);   opacity: 1; }
        38%   { clip-path: inset(0 0% 0 0);   opacity: 1; }
        40%   { clip-path: inset(0 100% 0 0); opacity: 0; }
        100%  { clip-path: inset(0 100% 0 0); opacity: 0; }
      }

      .tw3 { animation: tw3 50s linear infinite; }
      @keyframes tw3 {
        0%    { clip-path: inset(0 100% 0 0); opacity: 0; }
        40%   { clip-path: inset(0 100% 0 0); opacity: 0; }
        40.1% { clip-path: inset(0 100% 0 0); opacity: 1; }
        46%   { clip-path: inset(0 0% 0 0);   opacity: 1; }
        58%   { clip-path: inset(0 0% 0 0);   opacity: 1; }
        60%   { clip-path: inset(0 100% 0 0); opacity: 0; }
        100%  { clip-path: inset(0 100% 0 0); opacity: 0; }
      }

      .tw4 { animation: tw4 50s linear infinite; }
      @keyframes tw4 {
        0%    { clip-path: inset(0 100% 0 0); opacity: 0; }
        60%   { clip-path: inset(0 100% 0 0); opacity: 0; }
        60.1% { clip-path: inset(0 100% 0 0); opacity: 1; }
        66%   { clip-path: inset(0 0% 0 0);   opacity: 1; }
        78%   { clip-path: inset(0 0% 0 0);   opacity: 1; }
        80%   { clip-path: inset(0 100% 0 0); opacity: 0; }
        100%  { clip-path: inset(0 100% 0 0); opacity: 0; }
      }

      .tw5 { animation: tw5 50s linear infinite; }
      @keyframes tw5 {
        0%    { clip-path: inset(0 100% 0 0); opacity: 0; }
        80%   { clip-path: inset(0 100% 0 0); opacity: 0; }
        80.1% { clip-path: inset(0 100% 0 0); opacity: 1; }
        86%   { clip-path: inset(0 0% 0 0);   opacity: 1; }
        98%   { clip-path: inset(0 0% 0 0);   opacity: 1; }
        100%  { clip-path: inset(0 100% 0 0); opacity: 0; }
      }
    </style>
  </defs>

  <rect width="800" height="110" fill="#ffffff"/>
  <rect x="0" y="0" width="800" height="3" fill="#4f46e5" opacity="0.75"/>

  <text y="54">
    <tspan x="40" class="greeting">Hi there, I'm </tspan><tspan class="name">Andrew Baldonado</tspan>
  </text>

  <text x="40" y="86" class="tw1">💻 Software Developer</text>
  <text x="40" y="86" class="tw2">🌐 VB.Net</text>
  <text x="40" y="86" class="tw3">🕸️ Web</text>
  <text x="40" y="86" class="tw4">🔧 Embedded Systems</text>
  <text x="40" y="86" class="tw5">⚡ Full-Stack to Hardware</text>

  <rect x="232" y="72" width="2" height="16" class="cursor"/>

</svg>
